name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.cs"
      - "*.csproj"
      - "*.slnx"
      - "Configuration/**"
      - "Data/**"
      - "Endpoints/**"
      - "Models/**"
      - "Services/**"
      - "Workers/**"
      - "ScraperAgent.ServiceDefaults/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - "appsettings.json"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: repo
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Instance
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose and config files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SCW_VM_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,appsettings.json"
          target: "/opt/scraperagent"
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOLLIE_REDIRECT: ${{ secrets.MOLLIE_REDIRECT_BASE_URL }}
        with:
          host: ${{ secrets.SCW_VM_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,MOLLIE_REDIRECT
          script: |
            cd /opt/scraperagent

            # Login to GHCR using workflow token
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Ensure lowercase repo name in .env
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            grep -q "^GITHUB_REPOSITORY_LOWER=" .env 2>/dev/null && \
              sed -i "s|^GITHUB_REPOSITORY_LOWER=.*|GITHUB_REPOSITORY_LOWER=$REPO_LOWER|" .env || \
              echo "GITHUB_REPOSITORY_LOWER=$REPO_LOWER" >> .env

            # Update Mollie URLs in .env
            sed -i "s|^Mollie__WebhookBaseUrl=.*|Mollie__WebhookBaseUrl=https://api.scraperagent.eu|" .env
            sed -i "s|^Mollie__RedirectBaseUrl=.*|Mollie__RedirectBaseUrl=$MOLLIE_REDIRECT|" .env

            # Pull latest image
            docker compose -f docker-compose.prod.yml pull api

            # Restart (force-recreate to pick up config file changes)
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            # Prune old images
            docker image prune -f

      - name: Health check
        run: |
          sleep 15
          curl -sf https://api.scraperagent.eu/api/version || echo "Warning: Health check failed (may need DNS propagation)"
