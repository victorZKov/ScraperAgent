name: Setup Instance (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Initial Instance Setup
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to instance
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SCW_VM_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,appsettings.json,searxng/"
          target: "/opt/scraperagent"

      - name: Create .env and start services
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SCW_VM_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            cd /opt/scraperagent

            # Create production .env
            cat > .env <<EOF
            ConnectionStrings__configdb=Host=${{ secrets.DB_HOST }};Port=${{ secrets.DB_PORT }};Database=scraperagent;Username=scraperagent;Password=${{ secrets.DB_PASSWORD }};SSL Mode=Require;Trust Server Certificate=true
            AzureOpenAI__Endpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}
            AzureOpenAI__ApiKey=${{ secrets.AZURE_OPENAI_API_KEY }}
            AzureOpenAI__DeploymentName=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
            Email__Smtp__Username=${{ secrets.SMTP_USERNAME }}
            Email__Smtp__Password=${{ secrets.SMTP_PASSWORD }}
            Finnhub__ApiKey=${{ secrets.FINNHUB_API_KEY }}
            Mollie__ApiKey=${{ secrets.MOLLIE_API_KEY }}
            Mollie__WebhookBaseUrl=https://api.scraperagent.eu
            Mollie__RedirectBaseUrl=${{ secrets.MOLLIE_REDIRECT_BASE_URL }}
            TweetSource=live
            ReportRecipients=${{ secrets.REPORT_RECIPIENTS }}
            SearXNG__BaseUrl=http://searxng:8080
            ASPNETCORE_ENVIRONMENT=Production
            GITHUB_REPOSITORY_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_TAG=latest
            EOF
            chmod 600 .env

            # Generate random SearXNG secret key
            SEARXNG_SECRET=$(openssl rand -hex 32)
            if [ -f searxng/settings.yml ]; then
              sed -i "s/ <SEARXNG_SECRET_KEY>/$SEARXNG_SECRET/" searxng/settings.yml
            fi

            # Login to GHCR and start services
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            echo "Setup complete. Services starting..."
            sleep 10
            docker compose -f docker-compose.prod.yml ps
