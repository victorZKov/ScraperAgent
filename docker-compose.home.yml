# docker-compose.home.yml
# Run ScraperAgent backend on a home Windows PC with Docker Desktop.
# Exposes the API via Cloudflare Tunnel (no port forwarding needed).
#
# Usage:
#   1. Copy .env.home.template → .env  and fill in your values
#   2. docker compose -f docker-compose.home.yml up -d --build
#
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5100
      - SearXNG__BaseUrl=http://searxng:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      searxng:
        condition: service_started
    networks:
      - scraperagent

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng
    networks:
      - scraperagent

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scraperagent

networks:
  scraperagent:
    driver: bridge
