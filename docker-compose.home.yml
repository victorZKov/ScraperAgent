# docker-compose.home.yml
# Run ScraperAgent backend on a home Windows PC with Docker Desktop.
# Exposes the API via Cloudflare Tunnel (no port forwarding needed).
#
# Usage:
#   1. Copy .env.home.template → .env  and fill in your values
#   2. docker compose -f docker-compose.home.yml up -d --build
#
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=scraperagent
      - POSTGRES_USER=scraperagent
      - POSTGRES_PASSWORD=${DB_PASSWORD:- <DB_PASSWORD_DEFAULT>}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraperagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scraperagent

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5100
      - SearXNG__BaseUrl=http://searxng:8080
      - ConnectionStrings__configdb=Host=postgres;Port=5432;Database=scraperagent;Username=scraperagent;Password=${DB_PASSWORD:- <DB_PASSWORD_DEFAULT>}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - scraperagent

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng
    networks:
      - scraperagent

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - scraperagent

volumes:
  pgdata:

networks:
  scraperagent:
    driver: bridge
