# TEMPLATE — replace all <PLACEHOLDERS> before applying
# Do NOT commit real credentials to git
apiVersion: v1
kind: Secret
metadata:
  name: scraperagent-api-secrets
  namespace: scraperagent
type: Opaque
stringData:
  # Database (password must match postgres-credentials secret)
  ConnectionStrings__configdb: "Host=postgres;Port=5432;Database=scraperagent;Username=scraperagent;Password=<SAME_AS_POSTGRES_PASSWORD>"
  # Azure OpenAI
  AzureOpenAI__Endpoint: "<AZURE_OPENAI_ENDPOINT>"
  AzureOpenAI__ApiKey: "<AZURE_OPENAI_KEY>"
  AzureOpenAI__DeploymentName: "gpt-4o"
  # Scaleway AI
  ScalewayAI__ApiKey: "<SCALEWAY_AI_KEY>"
  # SMTP
  Email__Smtp__Username: "<SMTP_USERNAME>"
  Email__Smtp__Password: "<SMTP_PASSWORD>"
  # Finnhub
  Finnhub__ApiKey: "<FINNHUB_KEY>"
  # Mollie
  Mollie__ApiKey: "<MOLLIE_LIVE_KEY>"
  # Twitter proxy (home residential IP to bypass datacenter blocks)
  TwitterProxy: "http://scraper:***REMOVED***@ <HOME_PUBLIC_IP>:8388"
  # QuantumID OIDC (JwtBearer authority — no client secret needed on API side)
  QuantumID__Authority: "https://auth.quantumapi.eu"
  QuantumID__ClientId: "kovimatic_scraperagent-ui"

