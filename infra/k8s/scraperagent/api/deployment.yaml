apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraperagent-api
  namespace: scraperagent
  labels:
    app: scraperagent-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scraperagent-api
  template:
    metadata:
      labels:
        app: scraperagent-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/victorzkov/scraperagent-api:latest
          ports:
            - containerPort: 5100
          envFrom:
            - configMapRef:
                name: scraperagent-api-config
            - secretRef:
                name: scraperagent-api-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /alive
              port: 5100
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5100
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /alive
              port: 5100
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
