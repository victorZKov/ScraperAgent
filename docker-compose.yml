services:
  scraper-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7071:80"
    environment:
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1
      - FUNCTIONS_WORKER_RUNTIME=dotnet-isolated
      - AzureOpenAI__Endpoint=${AZURE_OPENAI_ENDPOINT}
      - AzureOpenAI__ApiKey=${AZURE_OPENAI_API_KEY}
      - AzureOpenAI__DeploymentName=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      - TweetSource=live
      - ReportRecipients=${REPORT_RECIPIENTS}
      - ServiceBusConnection=${SERVICE_BUS_CONNECTION}
      - Finnhub__ApiKey=${FINNHUB_API_KEY}
      - SearXNG__BaseUrl=http://searxng:8080
      - Email__FromEmail=noreply@victorz.cloud
      - Email__FromName=Market Intelligence Agent
      - Email__Smtp__Host=smtp.tem.scaleway.com
      - Email__Smtp__Port=587
      - Email__Smtp__EnableSsl=true
      - Email__Smtp__Username=${SMTP_USERNAME}
      - Email__Smtp__Password=${SMTP_PASSWORD}
    volumes:
      - ./local.settings.json:/home/site/wwwroot/local.settings.json:ro
    depends_on:
      - azurite
      - searxng
    restart: unless-stopped

  scraper-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:7071
    depends_on:
      - scraper-agent
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    restart: unless-stopped
